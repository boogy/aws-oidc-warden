name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        id: test
        shell: bash
        run: |
          set -o pipefail
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./... | tee test-output.txt

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.test.outcome }}" == "success" ]; then
            echo "✅ **All tests passed!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some tests failed**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage" >> $GITHUB_STEP_SUMMARY
          [ -f coverage.out ] && go tool cover -func=coverage.out | tail -1 >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Test Output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -50 test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage reports
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.out
          fail_ci_if_error: false
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        id: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Generate lint summary
        if: always()
        run: |
          echo "## Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.golangci-lint.outcome }}" == "success" ]; then
            echo "✅ **No linting issues found!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Linting issues detected**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please check the golangci-lint output above for details." >> $GITHUB_STEP_SUMMARY
          fi

  govulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [apigateway, apigatewayv2, alb, lambdaurl, local]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.module }}
        id: build
        run: |
          if [ "${{ matrix.module }}" = "local" ]; then
            go build -v -o build/${{ matrix.module }} ./cmd/${{ matrix.module }}
          else
            GOOS=linux GOARCH=arm64 go build -v -tags=lambda.norpc -o build/bootstrap-${{ matrix.module }} ./cmd/${{ matrix.module }}
          fi

      - name: Generate build summary
        if: always()
        run: |
          echo "## Build Results - ${{ matrix.module }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "✅ **Build succeeded for ${{ matrix.module }}**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "${{ matrix.module }}" = "local" ]; then
              BINARY="build/${{ matrix.module }}"
            else
              BINARY="build/bootstrap-${{ matrix.module }}"
            fi

            if [ -f "$BINARY" ]; then
              SIZE=$(du -h "$BINARY" | cut -f1)
              echo "- Binary size: \`$SIZE\`" >> $GITHUB_STEP_SUMMARY
              if [ "${{ matrix.module }}" != "local" ]; then
                echo "- Target: \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
                echo "- Tags: \`lambda.norpc\`" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          else
            echo "❌ **Build failed for ${{ matrix.module }}**" >> $GITHUB_STEP_SUMMARY
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Run gosec security scanner
        id: gosec
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        with:
          args: -fmt text ./...
        continue-on-error: true

      - name: Generate security summary
        if: always()
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Trivy Vulnerability Scanner" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.trivy.outcome }}" == "success" ]; then
            echo "✅ **No critical or high vulnerabilities detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Vulnerabilities detected - check scan output above**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Gosec Security Scanner" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.gosec.outcome }}" == "success" ]; then
            echo "✅ **No security issues detected**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Security issues detected - check scan output above**" >> $GITHUB_STEP_SUMMARY
          fi
