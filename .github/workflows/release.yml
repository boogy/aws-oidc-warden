name: Release

# Single tag-triggered release. On a `v*` tag this workflow produces both:
#   - GoReleaser: zip archives + checksums + provenance (job: goreleaser)
#   - ko:         container images to GHCR/Docker Hub, cosign, provenance (job: images)
# The two are independent (no cross-job `needs`): a container-push failure must not
# block the GitHub release, and vice versa. They run in parallel.

on:
  push:
    tags:
      - "v*"

env:
  REPO_NAME: aws-oidc-warden
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io

# Tag-triggered release: never cancel a partial release run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # keyless signing of provenance
      attestations: write # write build attestations
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/*.zip, dist/*_SHA256SUMS"

  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless + provenance
      attestations: write # build attestations
    strategy:
      matrix:
        module: [apigateway, apigatewayv2, alb, lambdaurl]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Set up ko
        uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10

      - name: Set up cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # ko has no config-file tag scheme; tags must be passed via --tags on the
      # CLI (a `tags:` key under .ko.yaml `builds[]` is not a real ko option
      # and is silently ignored, which is why this used explicit --tags before
      # #244's refactor). apigateway is the default module and also carries
      # the bare <tag>/latest.
      - name: Build and push ${{ matrix.module }} to GHCR
        id: ghcr
        env:
          KO_DOCKER_REPO: ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO_NAME }}
          VERSION: ${{ github.ref_name }}
        run: |
          echo "Building and pushing ${{ matrix.module }} to GHCR..."
          echo "KO_DOCKER_REPO: $KO_DOCKER_REPO"
          TAGS="${{ matrix.module }}-$VERSION,${{ matrix.module }}-latest"
          if [ "${{ matrix.module }}" = "apigateway" ]; then
            TAGS="$TAGS,$VERSION,latest"
          fi
          IMAGE=$(ko publish ./cmd/${{ matrix.module }}/ --bare --tags="$TAGS")
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "digest=${IMAGE##*@}" >> "$GITHUB_OUTPUT"
        timeout-minutes: 15

      - name: Build and push ${{ matrix.module }} to Docker Hub
        id: dockerhub
        env:
          KO_DOCKER_REPO: ${{ env.DOCKERHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO_NAME }}
          VERSION: ${{ github.ref_name }}
        run: |
          echo "Building and pushing ${{ matrix.module }} to Docker Hub..."
          echo "KO_DOCKER_REPO: $KO_DOCKER_REPO"
          TAGS="${{ matrix.module }}-$VERSION,${{ matrix.module }}-latest"
          if [ "${{ matrix.module }}" = "apigateway" ]; then
            TAGS="$TAGS,$VERSION,latest"
          fi
          IMAGE=$(ko publish ./cmd/${{ matrix.module }}/ --bare --tags="$TAGS")
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "digest=${IMAGE##*@}" >> "$GITHUB_OUTPUT"
        timeout-minutes: 15

      - name: Sign images (keyless)
        env:
          GHCR_IMAGE: ${{ steps.ghcr.outputs.image }}
          DH_IMAGE: ${{ steps.dockerhub.outputs.image }}
        run: |
          cosign sign --yes "$GHCR_IMAGE"
          cosign sign --yes "$DH_IMAGE"

      - name: Attest GHCR image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO_NAME }}
          subject-digest: ${{ steps.ghcr.outputs.digest }}
          push-to-registry: true

      - name: Attest Docker Hub image provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.DOCKERHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO_NAME }}
          subject-digest: ${{ steps.dockerhub.outputs.digest }}
          push-to-registry: true

  scan:
    runs-on: ubuntu-latest
    needs: images
    strategy:
      matrix:
        module: [apigateway, apigatewayv2, alb, lambdaurl]
    steps:
      - name: Pull image for scanning
        env:
          IMAGE_REF: ${{ env.DOCKERHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO_NAME }}:${{ matrix.module }}-${{ github.ref_name }}
        run: |
          echo "Pulling image for scanning: $IMAGE_REF"
          max_attempts=5
          for attempt in $(seq 1 $max_attempts); do
            if docker pull $IMAGE_REF; then
              break
            fi
            if [ $attempt -eq $max_attempts ]; then
              echo "Failed to pull image after $max_attempts attempts"
              exit 1
            fi
            echo "Retry $attempt/$max_attempts: Image not yet available, waiting..."
            sleep 10
          done

      - name: Scan container image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.DOCKERHUB_REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO_NAME }}:${{ matrix.module }}-${{ github.ref_name }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  summary:
    runs-on: ubuntu-latest
    needs: [images, scan]
    permissions:
      actions: write # Required for writing to GITHUB_STEP_SUMMARY
    steps:
      - name: Generate deployment info
        run: |
          echo "## Container Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following container images have been built and pushed:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for registry in "${{ env.GHCR_REGISTRY }}" "${{ env.DOCKERHUB_REGISTRY }}"; do
            echo "### $( [[ $registry == "${{ env.GHCR_REGISTRY }}" ]] && echo "GitHub Container Registry" || echo "Docker Hub" )" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**API Gateway module:**" >> $GITHUB_STEP_SUMMARY
            echo "- \`$registry/${{ github.repository_owner }}/${{ env.REPO_NAME }}:apigateway-${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`$registry/${{ github.repository_owner }}/${{ env.REPO_NAME }}:apigateway-latest\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**API Gateway v2 module:**" >> $GITHUB_STEP_SUMMARY
            echo "- \`$registry/${{ github.repository_owner }}/${{ env.REPO_NAME }}:apigatewayv2-${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`$registry/${{ github.repository_owner }}/${{ env.REPO_NAME }}:apigatewayv2-latest\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**ALB module:**" >> $GITHUB_STEP_SUMMARY
            echo "- \`$registry/${{ github.repository_owner }}/${{ env.REPO_NAME }}:alb-${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`$registry/${{ github.repository_owner }}/${{ env.REPO_NAME }}:alb-latest\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Lambda URL module:**" >> $GITHUB_STEP_SUMMARY
            echo "- \`$registry/${{ github.repository_owner }}/${{ env.REPO_NAME }}:lambdaurl-${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- \`$registry/${{ github.repository_owner }}/${{ env.REPO_NAME }}:lambdaurl-latest\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done
          echo "### Architectures" >> $GITHUB_STEP_SUMMARY
          echo "- linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "- linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage in AWS Lambda" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Choose the appropriate image based on your Lambda integration (use GHCR or Docker Hub images):" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**API Gateway:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO_NAME }}:apigateway-${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**API Gateway v2:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO_NAME }}:apigatewayv2-${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application Load Balancer:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO_NAME }}:alb-${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Lambda URL:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.REPO_NAME }}:lambdaurl-${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
