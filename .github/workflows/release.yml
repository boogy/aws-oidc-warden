name: Release

# Tag-triggered release. Division of responsibility on a `v*` tag:
#   - release.yml (this file): GoReleaser — zip archives + checksums + provenance.
#   - build.yml:               ko — container images to GHCR/Docker Hub, cosign, provenance.
# TODO: consider consolidating both into a single tag-release workflow to reduce
# duplicated checkout/setup-go/attest wiring.

on:
  push:
    tags:
      - "v*"

# Tag-triggered release: never cancel a partial release run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # keyless signing of provenance
      attestations: write # write build attestations
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "dist/*.zip, dist/*_SHA256SUMS"
