# https://ko.build/configuration/
baseImage: public.ecr.aws/lambda/provided:al2023

defaultPlatforms:
  - linux/arm64
  - linux/amd64

# AWS Lambda container images require the executable to be named 'bootstrap'.
#
# The per-build `tags:` below are the single source of truth for the published
# image scheme: `<module>-<tag>` / `<module>-latest`, with `apigateway` (the
# default module) additionally publishing the bare `<tag>` / `latest`. The
# release workflow and `make ko-publish` rely on these (no `--tags`). Only the
# local `make ko-build` (to ko.local) overrides with `--tags` so it does not
# depend on git tag state.
builds:
  - id: apigateway
    dir: .
    main: ./cmd/apigateway/main.go
    binary: bootstrap
    env:
      - CGO_ENABLED=0
      - GOOS=linux
    ldflags:
      - -extldflags "-static"
      - -s -w
      - -X github.com/boogy/aws-oidc-warden/internal/version.Version={{.Git.Tag}}
      - -X github.com/boogy/aws-oidc-warden/internal/version.Commit={{.Git.ShortCommit}}
      - -X github.com/boogy/aws-oidc-warden/internal/version.Date={{.Date}}
    flags:
      - -tags=lambda.norpc
      - -trimpath
    tags:
      - "apigateway-{{.Git.Tag}}"
      - "apigateway-latest"
      - "{{.Git.Tag}}" # default module → bare tags
      - "latest"

  - id: apigatewayv2
    dir: .
    main: ./cmd/apigatewayv2/main.go
    binary: bootstrap
    env:
      - CGO_ENABLED=0
      - GOOS=linux
    ldflags:
      - -extldflags "-static"
      - -s -w
      - -X github.com/boogy/aws-oidc-warden/internal/version.Version={{.Git.Tag}}
      - -X github.com/boogy/aws-oidc-warden/internal/version.Commit={{.Git.ShortCommit}}
      - -X github.com/boogy/aws-oidc-warden/internal/version.Date={{.Date}}
    flags:
      - -tags=lambda.norpc
      - -trimpath
    tags:
      - "apigatewayv2-{{.Git.Tag}}"
      - "apigatewayv2-latest"

  - id: alb
    dir: .
    main: ./cmd/alb/main.go
    binary: bootstrap
    env:
      - CGO_ENABLED=0
      - GOOS=linux
    ldflags:
      - -extldflags "-static"
      - -s -w
      - -X github.com/boogy/aws-oidc-warden/internal/version.Version={{.Git.Tag}}
      - -X github.com/boogy/aws-oidc-warden/internal/version.Commit={{.Git.ShortCommit}}
      - -X github.com/boogy/aws-oidc-warden/internal/version.Date={{.Date}}
    flags:
      - -tags=lambda.norpc
      - -trimpath
    tags:
      - "alb-{{.Git.Tag}}"
      - "alb-latest"

  - id: lambdaurl
    dir: .
    main: ./cmd/lambdaurl/main.go
    binary: bootstrap
    env:
      - CGO_ENABLED=0
      - GOOS=linux
    ldflags:
      - -extldflags "-static"
      - -s -w
      - -X github.com/boogy/aws-oidc-warden/internal/version.Version={{.Git.Tag}}
      - -X github.com/boogy/aws-oidc-warden/internal/version.Commit={{.Git.ShortCommit}}
      - -X github.com/boogy/aws-oidc-warden/internal/version.Date={{.Date}}
    flags:
      - -tags=lambda.norpc
      - -trimpath
    tags:
      - "lambdaurl-{{.Git.Tag}}"
      - "lambdaurl-latest"

labels:
  org.opencontainers.image.title: "AWS OIDC Warden"
  org.opencontainers.image.version: "{{.Git.Tag}}"
  org.opencontainers.image.revision: "{{.Git.ShortCommit}}"
  org.opencontainers.image.created: "{{.Date}}"
  org.opencontainers.image.description: "AWS OIDC token validator for GitHub Actions"
  org.opencontainers.image.source: "https://github.com/boogy/aws-oidc-warden"
  org.opencontainers.image.licenses: "Apache License 2.0"
  io.buildpacks.build.metadata: '{"aws_lambda_function_handler": "bootstrap"}'
