<svg xmlns="http://www.w3.org/2000/svg" width="760" height="780" viewBox="0 0 760 780" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="780" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#202124">Role authorization decision</text>

  <!-- Spine boxes -->
  <!-- R1 -->
  <rect x="140" y="60" width="300" height="44" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="290" y="87" text-anchor="middle" font-size="13" fill="#202124">Workflow sends OIDC token + role ARN</text>
  <!-- R2 -->
  <rect x="140" y="140" width="300" height="44" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="290" y="167" text-anchor="middle" font-size="13" fill="#202124">Validate token, extract claims</text>
  <!-- R3 decision -->
  <rect x="140" y="224" width="300" height="60" rx="8" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="290" y="250" text-anchor="middle" font-size="13" fill="#202124">Explicit mapping authorizes</text>
  <text x="290" y="268" text-anchor="middle" font-size="13" fill="#202124">the requested role?</text>
  <!-- R4 decision -->
  <rect x="140" y="332" width="300" height="52" rx="8" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="290" y="363" text-anchor="middle" font-size="13" fill="#202124">tag_auth.enabled?</text>
  <!-- R5 process -->
  <rect x="140" y="424" width="300" height="52" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="290" y="446" text-anchor="middle" font-size="13" fill="#202124">Read role IAM tags</text>
  <text x="290" y="464" text-anchor="middle" font-size="13" fill="#202124">(GetRole, cross-account aware)</text>
  <!-- R6 decision -->
  <rect x="140" y="516" width="300" height="60" rx="8" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="290" y="542" text-anchor="middle" font-size="13" fill="#202124">Role tags authorize the</text>
  <text x="290" y="560" text-anchor="middle" font-size="13" fill="#202124">claims?  (AND / OR)</text>
  <!-- R7 process -->
  <rect x="140" y="616" width="300" height="52" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="290" y="638" text-anchor="middle" font-size="13" fill="#202124">AssumeRole + attach</text>
  <text x="290" y="656" text-anchor="middle" font-size="13" fill="#202124">session tags (ABAC)</text>
  <!-- R8 terminal allow -->
  <rect x="190" y="708" width="200" height="44" rx="8" fill="#e6f4ea" stroke="#34a853"/>
  <text x="290" y="735" text-anchor="middle" font-size="14" font-weight="600" fill="#137333">ALLOW</text>

  <!-- Right terminals -->
  <rect x="520" y="230" width="210" height="48" rx="8" fill="#e6f4ea" stroke="#34a853"/>
  <text x="625" y="250" text-anchor="middle" font-size="13" font-weight="600" fill="#137333">ALLOW — via mapping</text>
  <text x="625" y="268" text-anchor="middle" font-size="12" fill="#137333">(+ session policy)</text>

  <rect x="520" y="334" width="210" height="48" rx="8" fill="#fce8e6" stroke="#ea4335"/>
  <text x="625" y="364" text-anchor="middle" font-size="14" font-weight="600" fill="#c5221f">DENY</text>

  <rect x="520" y="522" width="210" height="48" rx="8" fill="#fce8e6" stroke="#ea4335"/>
  <text x="625" y="552" text-anchor="middle" font-size="14" font-weight="600" fill="#c5221f">DENY</text>

  <!-- Vertical arrows -->
  <line x1="290" y1="104" x2="290" y2="138" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="290" y1="184" x2="290" y2="222" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="290" y1="284" x2="290" y2="330" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="310" font-size="12" font-weight="600" fill="#c5221f">No</text>
  <line x1="290" y1="384" x2="290" y2="422" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="408" font-size="12" font-weight="600" fill="#137333">Yes</text>
  <line x1="290" y1="476" x2="290" y2="514" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="290" y1="576" x2="290" y2="614" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="600" font-size="12" font-weight="600" fill="#137333">Yes</text>
  <line x1="290" y1="668" x2="290" y2="706" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Right-branch arrows -->
  <line x1="440" y1="254" x2="518" y2="254" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="246" font-size="12" font-weight="600" fill="#137333">Yes</text>
  <line x1="440" y1="358" x2="518" y2="358" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="350" font-size="12" font-weight="600" fill="#c5221f">No</text>
  <line x1="440" y1="546" x2="518" y2="546" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="538" font-size="12" font-weight="600" fill="#c5221f">No</text>
</svg>
