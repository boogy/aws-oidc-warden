<svg xmlns="http://www.w3.org/2000/svg" width="820" height="260" viewBox="0 0 820 260" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="260" fill="#ffffff"/>
  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#202124">Precedence:  explicit mapping first, tags as fallback</text>

  <!-- ALLOW terminals (top row) -->
  <rect x="195" y="58" width="166" height="56" rx="8" fill="#e6f4ea" stroke="#34a853"/>
  <text x="278" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#137333">ALLOW</text>
  <text x="278" y="100" text-anchor="middle" font-size="11" fill="#137333">uses mapping session policy</text>

  <rect x="428" y="58" width="166" height="56" rx="8" fill="#e6f4ea" stroke="#34a853"/>
  <text x="511" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#137333">ALLOW</text>
  <text x="511" y="100" text-anchor="middle" font-size="11" fill="#137333">no session policy</text>

  <!-- Start -->
  <rect x="28" y="160" width="120" height="56" rx="8" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="88" y="184" text-anchor="middle" font-size="12" fill="#202124">Requested role</text>
  <text x="88" y="202" text-anchor="middle" font-size="12" fill="#202124">+ claims</text>

  <!-- Decision 1 -->
  <rect x="188" y="150" width="172" height="76" rx="8" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="274" y="176" text-anchor="middle" font-size="12" fill="#202124">Explicit mapping</text>
  <text x="274" y="192" text-anchor="middle" font-size="12" fill="#202124">authorizes the</text>
  <text x="274" y="208" text-anchor="middle" font-size="12" fill="#202124">requested role?</text>

  <!-- Decision 2 -->
  <rect x="424" y="150" width="172" height="76" rx="8" fill="#fef7e0" stroke="#f9ab00"/>
  <text x="510" y="176" text-anchor="middle" font-size="12" fill="#202124">tag_auth enabled</text>
  <text x="510" y="192" text-anchor="middle" font-size="12" fill="#202124">AND role tags</text>
  <text x="510" y="208" text-anchor="middle" font-size="12" fill="#202124">authorize claims?</text>

  <!-- Deny -->
  <rect x="660" y="160" width="130" height="56" rx="8" fill="#fce8e6" stroke="#ea4335"/>
  <text x="725" y="194" text-anchor="middle" font-size="14" font-weight="600" fill="#c5221f">DENY</text>

  <!-- Arrows -->
  <line x1="148" y1="188" x2="186" y2="188" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <line x1="274" y1="150" x2="274" y2="116" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="284" y="138" font-size="12" font-weight="600" fill="#137333">Yes</text>

  <line x1="360" y1="188" x2="422" y2="188" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="380" y="180" font-size="12" font-weight="600" fill="#c5221f">No</text>

  <line x1="510" y1="150" x2="510" y2="116" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="520" y="138" font-size="12" font-weight="600" fill="#137333">Yes</text>

  <line x1="596" y1="188" x2="658" y2="188" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <text x="616" y="180" font-size="12" font-weight="600" fill="#c5221f">No</text>
</svg>
