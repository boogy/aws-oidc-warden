<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="360" fill="#ffffff"/>
  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#202124">Tag matching:  AND across tags · OR within a tag</text>

  <!-- column headers -->
  <text x="225" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#5f6368">ROLE TAGS</text>
  <text x="640" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#5f6368">TOKEN CLAIMS</text>

  <!-- Row A -->
  <rect x="40" y="86" width="118" height="40" rx="6" fill="#e8eaed" stroke="#9aa0a6"/>
  <text x="99" y="111" text-anchor="middle" font-size="13" fill="#202124">aow/repo</text>
  <rect x="170" y="86" width="92" height="40" rx="6" fill="#ffffff" stroke="#4285f4"/>
  <text x="216" y="111" text-anchor="middle" font-size="12" fill="#202124">acme/api</text>
  <text x="285" y="111" text-anchor="middle" font-size="12" font-weight="600" fill="#f9ab00">OR</text>
  <rect x="308" y="86" width="92" height="40" rx="6" fill="#ffffff" stroke="#4285f4"/>
  <text x="354" y="111" text-anchor="middle" font-size="12" fill="#202124">acme/web</text>
  <line x1="404" y1="106" x2="476" y2="106" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="440" y="98" text-anchor="middle" font-size="11" fill="#5f6368">=?</text>
  <rect x="486" y="86" width="286" height="40" rx="6" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="629" y="111" text-anchor="middle" font-size="12" fill="#202124">repository = "acme/api"</text>
  <text x="790" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#137333">✓</text>

  <!-- AND connector -->
  <rect x="372" y="146" width="76" height="28" rx="14" fill="#f9ab00"/>
  <text x="410" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">AND</text>

  <!-- Row B -->
  <rect x="40" y="194" width="118" height="40" rx="6" fill="#e8eaed" stroke="#9aa0a6"/>
  <text x="99" y="219" text-anchor="middle" font-size="13" fill="#202124">aow/ref</text>
  <rect x="170" y="194" width="230" height="40" rx="6" fill="#ffffff" stroke="#4285f4"/>
  <text x="285" y="219" text-anchor="middle" font-size="12" fill="#202124">refs/heads/main</text>
  <line x1="404" y1="214" x2="476" y2="214" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="440" y="206" text-anchor="middle" font-size="11" fill="#5f6368">=?</text>
  <rect x="486" y="194" width="286" height="40" rx="6" fill="#e8f0fe" stroke="#4285f4"/>
  <text x="629" y="219" text-anchor="middle" font-size="12" fill="#202124">ref = "refs/heads/main"</text>
  <text x="790" y="220" text-anchor="middle" font-size="18" font-weight="700" fill="#137333">✓</text>

  <!-- result -->
  <line x1="410" y1="234" x2="410" y2="296" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <text x="470" y="272" text-anchor="middle" font-size="12" fill="#5f6368">all tags match</text>
  <rect x="330" y="300" width="160" height="42" rx="8" fill="#e6f4ea" stroke="#34a853"/>
  <text x="410" y="326" text-anchor="middle" font-size="14" font-weight="600" fill="#137333">AUTHORIZED</text>
</svg>
