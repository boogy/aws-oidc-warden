<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 828" width="1000" height="828" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" role="img" aria-label="AWS OIDC Warden token validation pipeline (self mode)">
  <title>AWS OIDC Warden — Token Validation Pipeline (self mode)</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="8" y="8" width="984" height="812" rx="14" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>

  <!-- title -->
  <text x="336" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Token Validation Pipeline</text>
  <text x="336" y="66" text-anchor="middle" font-size="13" fill="#64748b">Self mode — fail-closed: every step must pass, any failure denies</text>

  <!-- vertical spine arrows -->
  <g stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" fill="none">
    <line x1="336" y1="136" x2="336" y2="149"/>
    <line x1="336" y1="206" x2="336" y2="223"/>
    <line x1="336" y1="280" x2="336" y2="297"/>
    <line x1="336" y1="354" x2="336" y2="371"/>
    <line x1="336" y1="428" x2="336" y2="445"/>
    <line x1="336" y1="502" x2="336" y2="519"/>
    <line x1="336" y1="576" x2="336" y2="593"/>
    <line x1="336" y1="650" x2="336" y2="667"/>
    <line x1="336" y1="724" x2="336" y2="759"/>
  </g>

  <!-- dashed deny connectors (unlabeled, short, horizontal) -->
  <g stroke="#dc2626" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrowRed)" fill="none" opacity="0.8">
    <line x1="616" y1="178" x2="679" y2="178"/>
    <line x1="616" y1="252" x2="679" y2="252"/>
    <line x1="616" y1="326" x2="679" y2="326"/>
    <line x1="616" y1="400" x2="679" y2="400"/>
    <line x1="616" y1="474" x2="679" y2="474"/>
    <line x1="616" y1="548" x2="679" y2="548"/>
    <line x1="616" y1="622" x2="679" y2="622"/>
    <line x1="616" y1="696" x2="679" y2="696"/>
  </g>

  <!-- input pill -->
  <rect x="56" y="96" width="560" height="40" rx="20" fill="#0f172a"/>
  <text x="336" y="121" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Incoming OIDC token  ·  requested role ARN</text>

  <!-- stage boxes -->
  <!-- S1 -->
  <rect x="56" y="150" width="560" height="56" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="74" y="174" font-size="14" font-weight="700" fill="#0f172a">0 · Length guard</text>
  <text x="74" y="193" font-size="11.5" fill="#475569">Reject if larger than max_token_bytes (8 KB) — before any parsing</text>
  <!-- S2 -->
  <rect x="56" y="224" width="560" height="56" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="74" y="248" font-size="14" font-weight="700" fill="#0f172a">1 · Unverified iss peek</text>
  <text x="74" y="267" font-size="11.5" fill="#475569">Read iss for routing only — never trusted for identity or authz</text>
  <!-- S3 -->
  <rect x="56" y="298" width="560" height="56" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="74" y="322" font-size="14" font-weight="700" fill="#0f172a">2 · Registry lookup</text>
  <text x="74" y="341" font-size="11.5" fill="#475569">Exact-match iss → issuer spec · unknown issuer denies (no fetch)</text>
  <!-- S4 -->
  <rect x="56" y="372" width="560" height="56" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="74" y="396" font-size="14" font-weight="700" fill="#0f172a">3 · Issuer-scoped parser</text>
  <text x="74" y="415" font-size="11.5" fill="#475569">Algorithm allow-list RS/ES 256–512 · never none or HS*</text>
  <!-- S5 (crypto highlight) -->
  <rect x="56" y="446" width="560" height="56" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="74" y="470" font-size="14" font-weight="700" fill="#312e81">4 · Verify signature</text>
  <text x="74" y="489" font-size="11.5" fill="#3730a3">JWKS cache-first · key pinned by kid + alg + type · RSA ≥ 2048 / EC on-curve</text>
  <!-- S6 -->
  <rect x="56" y="520" width="560" height="56" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="74" y="544" font-size="14" font-weight="700" fill="#0f172a">4b · Re-assert issuer</text>
  <text x="74" y="563" font-size="11.5" fill="#475569">Verified iss must still equal the matched spec (hot-reload guard)</text>
  <!-- S7 -->
  <rect x="56" y="594" width="560" height="56" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="74" y="618" font-size="14" font-weight="700" fill="#0f172a">6–9 · Claim checks</text>
  <text x="74" y="637" font-size="11.5" fill="#475569">sub · iat · exp · nbf · lifetime/age · audience ANY-match · required_claims</text>
  <!-- S8 -->
  <rect x="56" y="668" width="560" height="56" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="74" y="692" font-size="14" font-weight="700" fill="#0f172a">10 · Normalize</text>
  <text x="74" y="711" font-size="11.5" fill="#475569">Derive canonical Subject (never self-asserted) + raw claims map</text>

  <!-- output pill -->
  <rect x="56" y="760" width="560" height="40" rx="20" fill="#16a34a"/>
  <text x="336" y="785" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Verified claims  →  authorization  →  STS AssumeRole</text>

  <!-- deny rail -->
  <rect x="680" y="150" width="296" height="574" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="828" y="300" text-anchor="middle" font-size="16" font-weight="700" fill="#991b1b">DENY — fail-closed</text>
  <text x="828" y="332" text-anchor="middle" font-size="12" fill="#b91c1c">Any failed check stops the</text>
  <text x="828" y="350" text-anchor="middle" font-size="12" fill="#b91c1c">pipeline immediately.</text>
  <text x="828" y="368" text-anchor="middle" font-size="12" fill="#b91c1c">No partial credentials.</text>
  <line x1="712" y1="400" x2="944" y2="400" stroke="#fca5a5" stroke-width="1"/>
  <text x="828" y="438" text-anchor="middle" font-size="12.5" font-weight="600" fill="#991b1b">400 · invalid_request</text>
  <text x="828" y="462" text-anchor="middle" font-size="12.5" font-weight="600" fill="#991b1b">401 · token_invalid</text>
  <text x="828" y="486" text-anchor="middle" font-size="12.5" font-weight="600" fill="#991b1b">403 · permission_denied</text>
  <text x="828" y="510" text-anchor="middle" font-size="12.5" font-weight="600" fill="#991b1b">500 · audit_write_failed *</text>
  <text x="828" y="536" text-anchor="middle" font-size="10.5" font-style="italic" fill="#b91c1c">* only when audit_required = true</text>

  <!-- footnote -->
  <text x="336" y="758" text-anchor="middle" font-size="10.5" fill="#94a3b8"></text>
  <text x="500" y="815" text-anchor="middle" font-size="11" fill="#94a3b8">Delegated modes (apigw / alb) skip steps 1–4 (upstream verifies the signature) and enter the same checks at step 6.</text>
</svg>
