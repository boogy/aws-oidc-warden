####################################################################################
# AWS OIDC Warden — Example Configuration (v2, multi-issuer)
#
# v2 validates OIDC tokens from ANY number of issuers/providers and brokers
# short-lived AWS credentials. Precedence: AOW_-prefixed env vars > this file >
# defaults. See docs/CONFIGURATION.md for the full reference and
# docs/MIGRATION_V2.md if you are upgrading from a v1 single-issuer config.
####################################################################################

####################################################################################
# TRUSTED OIDC ISSUERS
#
# Each entry is one trusted issuer. The `iss` claim is matched EXACTLY (no
# normalization). At least one issuer is required; each needs at least one
# audience. If no config source is found at all, a single default GitHub
# Actions issuer is seeded automatically — but a present config that defines no
# issuers is a hard error (the seed never masks a misconfigured file).
####################################################################################
issuers:
  # --- GitHub Actions (native provider) ---
  - issuer: "https://token.actions.githubusercontent.com"
    # provider "github" natively unmarshals the full GitHub claim set and
    # defaults the canonical `subject` to the `repository` claim.
    provider: "github"
    audiences:
      - "sts.amazonaws.com"
    # jwks_uri is optional; omit to use OIDC discovery
    # (<issuer>/.well-known/openid-configuration).
    # claim_mappings is optional for github (subject defaults to `repository`);
    # override only to key authorization on a different claim.
    # claim_mappings:
    #   subject: "repository"
    required_claims:
      - "repository"
    # session_tags: STS tag key <- raw claim name. Tag KEYS must match
    # [A-Za-z0-9 _.:/=+@-]{1,128}. NOTE (v2 change): the `repo` tag now carries
    # the FULL "owner/repo" (raw `repository` claim); v1 stripped the owner.
    session_tags:
      repo: "repository"
      repo-owner: "repository_owner"
      ref: "ref"
      ref-type: "ref_type"
      actor: "actor"
      event-name: "event_name"

  # --- GitLab CI (generic provider) ---
  # A non-github provider is "generic": it has no native struct, so it MUST map
  # the canonical `subject` from a provider claim via claim_mappings.subject.
  - issuer: "https://gitlab.com"
    provider: "generic"
    audiences:
      - "https://gitlab.com" # GitLab's default OIDC audience is the instance URL
    claim_mappings:
      subject: "project_path" # e.g. "mygroup/myproject"
    required_claims:
      - "project_path"
    session_tags:
      project: "project_path"
      ref: "ref"
      ref-type: "ref_type"

## AWS role session name (identifies the session in CloudTrail).
role_session_name: aws-oidc-warden

## default_issuer: the issuer a role_mapping/role_group inherits when it does
## not set its own `issuer`. Required to resolve unbound mappings when more than
## one issuer is configured. Must reference an issuer defined above.
default_issuer: "https://token.actions.githubusercontent.com"

####################################################################################
# TOKEN HARDENING KNOBS (all optional; shown with their defaults)
####################################################################################
## Clock-skew leeway applied to exp/nbf/iat. Default 30s; hard maximum 120s
## (Validate() rejects anything higher). 0 means "use default", not "disable".
jwt_leeway: "30s"
## Cap token replay window. 0 = no cap.
max_token_lifetime: "0s" # reject if exp-iat exceeds this
max_token_age: "0s" # reject if now-iat exceeds this
## Reject tokens longer than this many bytes BEFORE parsing. Default 8192.
## 0 means "use default", not "unbounded".
max_token_bytes: 8192
## Minimum interval between forced JWKS refetches per (issuer, kid). Default 60s.
jwks_refetch_cooldown: "60s"
## Dev/test ONLY: permit http:// (loopback) issuer/jwks_uri. NEVER in production.
allow_insecure_issuers: false

####################################################################################
# LOGGING & AUDIT
####################################################################################
## slog level: debug | info | warn | error (default "info").
log_level: "info"
## When false (default), claim VALUES (canonical subject, raw sub, audience,
## session-tag values, repository/ref/actor) are suppressed in BOTH the log
## stream and the audit records; claim NAMES + decision + reason are kept.
log_claim_values: false
## When true, every allow decision's audit record must be durably written
## BEFORE credentials are returned; a write failure denies the request
## (fail-closed). Requires log_to_s3=true and log_bucket set.
## Default false keeps zero-dependency startup (decisions still log to
## CloudWatch); RECOMMENDED true in production when the audit trail is a
## security/compliance control. See docs/LOGGING.md.
audit_required: false
## Persist logs/audit records to S3 (in addition to CloudWatch).
log_to_s3: false
log_bucket: "aws-oidc-warden-logs"
log_prefix: "logs/"

####################################################################################
# JWKS CACHE
####################################################################################
cache:
  ## "memory" (default, per-container LRU), "dynamodb" (persistent/shared), or
  ## "s3" (large/cold objects).
  type: "memory"
  ttl: 4h
  max_local_size: 20
  # dynamodb_table: "aws-oidc-warden-cache"
  # s3_bucket: "arn:aws:s3:::aws-oidc-warden-cache"
  # s3_prefix: "jwks-cache"
  # s3_cleanup: true

####################################################################################
# S3 (session policies + optional remote config)
####################################################################################
## Bucket holding session-policy files referenced by session_policy_file below.
session_policy_bucket: "aws-oidc-warden-session-policies"

## Load the primary config from S3 (Lambda). When set, the service can
## hot-reload it on an interval without redeploying.
# s3_config_bucket: "aws-oidc-warden-config"
# s3_config_path: "config.yaml"
# config_reload_interval: "5m"   # 0 (default) disables reloading

####################################################################################
# CONFIG FRAGMENTS (optional, for scaling to thousands of mappings)
#
# Additional sources merged onto this base config on load/reload. A fragment
# may ONLY contribute role_mappings / role_groups / role_sets / default_issuer
# — issuers, hardening knobs, allow_insecure_issuers and tag_auth are base-only
# and REJECTED if a fragment tries to set them. A failed/invalid fragment
# retains the last-good config (fail-safe reload). Local filesystem paths are
# read directly and work today; "scheme://" URIs (e.g. s3://) resolve through
# an injected fetcher that the shipped binaries do NOT wire up yet — do not
# use remote fragment URIs in production until a fetcher is configured.
####################################################################################
# config_fragments:
#   - "/etc/aws-oidc-warden/fragments/team-a.yaml"
#   - "/etc/aws-oidc-warden/fragments/local.yaml"
## Optional integrity pin per fragment path (sha256 of the file contents).
# config_fragment_checksums:
#   "/etc/aws-oidc-warden/fragments/team-a.yaml": "sha256:..."

####################################################################################
# ROLE SETS (named, reusable role lists; reference with "@name" in roles)
####################################################################################
role_sets:
  # Map keys are plain names; reference them from a mapping's `roles` as "@name".
  readonly:
    - arn:aws:iam::123456789012:role/github-actions-readonly
  deployers:
    - arn:aws:iam::123456789012:role/github-actions-deploy
    - arn:aws:iam::123456789012:role/github-actions-create-repo

####################################################################################
# ROLE MAPPINGS (provider-neutral authorization)
#
# Each mapping binds a `subject` PATTERN (auto-anchored ^(?:...)$) to a set of
# assumable roles, scoped to a single issuer, optionally gated by `conditions`.
# The requested role must be one of the mapping's resolved roles — a token can
# never select an arbitrary role. `issuer` defaults to default_issuer above.
# `conditions` are regexes against RAW verified claim names (AND across
# dimensions); any claim not covered by a named field can be matched directly
# by its claim name.
####################################################################################
role_mappings:
  # Simple mapping, main branch only (inherits default_issuer = GitHub).
  - subject: "org/some-repo-name"
    roles: ["@deployers"] # role_set alias
    conditions:
      branch: "refs/heads/main"

  # External session policy file in S3.
  - subject: "org/main-branch-repo"
    session_policy_file: "session-policies/org/main-branch-repo/policy.json"
    roles:
      - arn:aws:iam::123456789012:role/github-actions-create-repo
    conditions:
      branch: "refs/heads/main"

  # Inline session policy + subject pattern for many repos.
  - subject: "org/service-.*"
    roles: ["@readonly"]
    session_policy: >
      {"Version":"2012-10-17","Statement":[{"Effect":"Deny","Action":["iam:*"],"Resource":"*"}]}

  # Multiple conditions (all must hold) incl. a generic claim by its raw name.
  - subject: "org/prod-repo"
    roles:
      - arn:aws:iam::123456789012:role/github-actions-prod
    conditions:
      ref: "refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+"
      ref_type: "tag"
      environment: "production" # regex against the raw 'runner_environment' claim
      sha: "^[0-9a-f]{40}$" # generic: any raw claim name works (must be string-typed)

  # A GitLab mapping — bound explicitly to the GitLab issuer. Its `subject` is
  # the canonical value produced by claim_mappings.subject (project_path).
  - subject: "mygroup/myproject"
    issuer: "https://gitlab.com"
    roles:
      - arn:aws:iam::123456789012:role/gitlab-ci-deploy
    conditions:
      ref: "main"

####################################################################################
# ROLE GROUPS (DRY: one entry expands to one mapping per subject, sharing
# issuer + defaults). Great for onboarding many repos with identical access.
####################################################################################
role_groups:
  - issuer: "https://token.actions.githubusercontent.com"
    subjects:
      - "org/frontend"
      - "org/backend"
      - "org/mobile"
    defaults:
      roles: ["@readonly"]
      conditions:
        event_name: "push"

####################################################################################
# TAG-BASED AUTHORIZATION (optional, default disabled) — enterprise-scale path.
#
# When enabled, a role whose IAM tags authorize a token's claims may be assumed
# even without a role_mapping. v2 is ISSUER-BOUND: set aow/issuer on the role;
# the canonical identity tag is aow/subject (aow/repo + aow/repo-owner remain
# accepted as aliases through the v2 migration window). See
# docs/TAG_BASED_AUTHORIZATION.md.
####################################################################################
tag_auth:
  enabled: false
  tag_prefix: "aow/"
  default_org: "" # if set, bare aow/repo tokens (e.g. "api") expand to "<default_org>/api"
  transitive_session_tags: false

####################################################################################
# CROSS-ACCOUNT TRANSPORT (optional, default disabled) — hub-and-spoke.
#
# When enabled, roles in other AWS accounts (role_mappings targets AND
# tag-authorized roles) are reached by first assuming a convention-named spoke
# role in the target account. Independent of tag_auth — explicit mappings can
# target member accounts with tag-auth off. Cross-account sessions are capped
# at 1h (AWS role-chaining limit). See docs/examples/cross-account/ for a full
# worked example including the IAM roles.
####################################################################################
cross_account:
  enabled: false
  spoke_role_name: "aow-spoke"
  external_id: ""
  spoke_session_duration: "15m"
  allowed_accounts: [] # member account IDs the warden may assume into; [] = ANY (set in production!)

####################################################################################
# JWT VALIDATION MODE — who verifies the signature.
#
# "self"  (default) full JWKS signature verification here (multi-issuer aware).
# "apigw" trust an API Gateway HTTP API v2 JWT Authorizer (claims from the
#         authorizer context). Delegated modes require EXACTLY ONE configured
#         issuer and still re-validate issuer/audience/exp/nbf/sub/time-bounds.
# "alb"   trust ALB OIDC; the ES256-signed x-amzn-oidc-data header is verified.
#         Set alb_expected_signer to the ALB ARN to prevent cross-ALB spoofing.
####################################################################################
jwt_validation:
  mode: "self"
  # alb_expected_signer: "arn:aws:elasticloadbalancing:us-east-1:123456789012:loadbalancer/app/my-alb/abc"
